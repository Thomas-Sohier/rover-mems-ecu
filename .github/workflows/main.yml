name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '^1.23.0'

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run tests
        run: go test -race -shuffle=on ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '^1.23.0'

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]

    strategy:
      matrix:
        goos: [linux]
        goarch: [arm64, amd64]

    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-go@v2
        with:
          go-version: '^1.23.0'
      - name: Go build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o rover-mems-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/rover-mems

      - name: Zip exes
        run: |
          zip -r rover-mems-${{ matrix.goos }}-${{ matrix.goarch }}.zip rover-mems-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: rover-mems-${{ matrix.goos }}-${{ matrix.goarch }}
          path: rover-mems-${{ matrix.goos }}-${{ matrix.goarch }}.zip

    