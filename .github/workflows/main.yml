name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux]
        goarch: [arm64, amd64]

    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-go@v2
        with:
          go-version: '^1.23.0'
      - name: Go build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o rover-mems-${{ matrix.goos }}-${{ matrix.goarch }} ./...

      - name: Zip exes
        run: |
          zip -r rover-mems-${{ matrix.goos }}-${{ matrix.goarch }}.zip rover-mems-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: rover-mems-${{ matrix.goos }}-${{ matrix.goarch }}
          path: rover-mems-${{ matrix.goos }}-${{ matrix.goarch }}.zip

    