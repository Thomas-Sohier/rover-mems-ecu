name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-go@v2
        with:
          go-version: '^1.23.0'
      - name: Go build for Linux ARM64
        env:
          GOOS: linux
          GOARCH: arm64
        run: |
          go build -o rover-mems-linux-arm64 ./...

      - name: Zip exes
        run: |
          zip -r rover-mems-linux-arm64.zip rover-mems-linux-arm64

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: rover-mems-linux-arm64
          path: rover-mems-linux-arm64.zip

    