run:
  go: "1.23"
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - misspell
    - unconvert

linters-settings:
  errcheck:
    # Serial read/write errors in tight loops are intentionally ignored.
    # Flag only clear mistakes outside of those patterns.
    check-type-assertions: true
    check-blank: false

issues:
  exclude-rules:
    # Ignored serial read errors in the K-line loop are intentional.
    - path: internal/ecu/mems1x/loop\.go
      linters: [errcheck]
      text: "sp\\.Read"
    - path: internal/ecu/mems1x/loop\.go
      linters: [errcheck]
      text: "sp\\.Write"
