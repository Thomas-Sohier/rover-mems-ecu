run:
  go: "1.23"
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - misspell
    - unconvert

linters-settings:
  errcheck:
    # Serial read/write errors in tight loops are intentionally ignored.
    # Flag only clear mistakes outside of those patterns.
    check-type-assertions: true
    check-blank: false

issues:
  exclude-rules:
    # Ignored serial read errors in the K-line loop are intentional.
    - path: internal/ecu/mems1x/loop\.go
      linters: [errcheck]
      text: "sp\\.Read"
    - path: internal/ecu/mems1x/loop\.go
      linters: [errcheck]
      text: "sp\\.Write"
    # K-line break/timing control errors are intentionally dropped during the
    # wake-up sequences; they are timing-driven and not recoverable mid-pulse.
    - path: internal/ecu/rc5/rc5\.go
      linters: [errcheck]
      text: "sp\\.SetBreak"
    - path: internal/ecu/mems2j/mems2j\.go
      linters: [errcheck]
      text: "sp\\.(SetBreak|Write)"
    - path: internal/ecu/mems19/mems19\.go
      linters: [errcheck]
      text: "sp\\.(SetBreak|SetReadParams)"
